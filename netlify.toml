# netlify.toml — weplace-private72.netlify.app

[build]
  publish = "."

# 단일 HTML — 루트 이외 경로 접근 시 index.html 서빙
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# HTML — 항상 최신본 확인
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control           = "public, max-age=0, must-revalidate"
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"

# 이미지 — 같은 파일명으로 교체해도 빠르게 반영되도록 짧은 캐시 + 재검증
# (max-age 5분 / 그 후에는 서버에 변경 여부 확인)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
